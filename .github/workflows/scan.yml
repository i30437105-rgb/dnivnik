name: Утренний скан рынка
on:
  schedule:
    - cron: "0 5 * * *"   # каждый день 05:00 UTC = 08:00 МСК
  workflow_dispatch: {}     # + запуск вручную кнопкой на GitHub

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python scripts/morning_scan.py
      - name: Публикация отчёта
        run: |
          git config user.name "scan-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/scan.html
          git commit -m "scan: автообновление утреннего отчёта" || echo "без изменений"
          git push
