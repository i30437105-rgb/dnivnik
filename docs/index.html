<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Дневник трейдера</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#131722;--card:#1e222d;--line:#2a2e39;--txt:#d1d4dc;--dim:#787b86;--g:#26a69a;--r:#ef5350;--y:#f5d90a}
*{box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',sans-serif;margin:0;padding:16px;max-width:1000px;margin:auto}
h1{font-size:20px;color:#fff;display:flex;justify-content:space-between;align-items:center}
h2{font-size:15px;color:#fff;margin:22px 0 8px}
.card{background:var(--card);border-radius:12px;padding:16px;margin-top:12px}
button{background:#2962ff;color:#fff;border:0;border-radius:8px;padding:9px 16px;font-size:14px;cursor:pointer}
button.sec{background:var(--line)}
input,select,textarea{background:var(--bg);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:14px;width:100%}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
th{text-align:left;color:var(--dim);padding:5px 8px;border-bottom:1px solid var(--line);font-weight:600}
td{padding:6px 8px;border-bottom:1px solid var(--line)}
.g{color:var(--g)}.r{color:var(--r)}.y{color:var(--y)}.dim{color:var(--dim);font-size:12px}
.bar{height:14px;background:var(--line);border-radius:7px;overflow:hidden;position:relative;margin-top:8px}
.bar>div{height:100%;border-radius:7px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.stat{background:var(--bg);border-radius:10px;padding:10px 12px}
.stat b{font-size:18px;display:block}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
dialog{background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:12px;max-width:480px;width:92%}
dialog::backdrop{background:rgba(0,0,0,.6)}
img.thumb{max-height:40px;border-radius:4px;cursor:pointer}
#login{max-width:340px;margin:80px auto}
</style>
</head>
<body>
<script>
// ═══ НАСТРОЙКА (заполнить после создания проекта Supabase) ═══
const SUPABASE_URL = "ВСТАВЬ_URL_ПРОЕКТА";      // например https://abcd1234.supabase.co
const SUPABASE_ANON = "ВСТАВЬ_ANON_KEY";
const SYNC_URL = SUPABASE_URL + "/functions/v1/bybit-sync";
</script>

<div id="login" style="display:none">
  <div class="card">
    <h2 style="margin-top:0">Вход в дневник</h2>
    <input id="email" type="email" placeholder="Email" style="margin-bottom:8px">
    <input id="pass" type="password" placeholder="Пароль" style="margin-bottom:12px">
    <button onclick="doLogin()" style="width:100%">Войти</button>
    <div id="loginErr" class="r" style="margin-top:8px"></div>
  </div>
</div>

<div id="app" style="display:none">
  <h1>📒 Дневник трейдера
    <span class="row">
      <button onclick="doSync()" id="syncBtn">⟳ Синк с Bybit</button>
      <button class="sec" onclick="sb.auth.signOut().then(()=>location.reload())">Выйти</button>
    </span>
  </h1>

  <div class="card" id="dayCard">Загрузка…</div>

  <h2>📊 Статистика (30 дней)</h2>
  <div class="card"><div class="grid" id="stats"></div>
    <div class="row" style="margin-top:14px;gap:24px;align-items:flex-start">
      <div style="flex:1;min-width:220px"><b class="dim">По монетам</b><table id="bySym"></table></div>
      <div style="flex:1;min-width:220px"><b class="dim">По часам входа</b><table id="byHour"></table></div>
    </div>
  </div>

  <h2>🧾 Сделки</h2>
  <div class="card"><table id="trades"></table></div>
</div>

<dialog id="dlg">
  <form method="dialog" style="padding:18px">
    <h2 style="margin-top:0" id="dlgTitle"></h2>
    <label class="dim">Комментарий (почему вошёл, что увидел)</label>
    <textarea id="dlgComment" rows="3"></textarea>
    <label class="dim" style="margin-top:8px;display:block">Состояние</label>
    <select id="dlgEmotion">
      <option value="">—</option><option>спокойно</option><option>уверенно</option>
      <option>FOMO</option><option>отыгрыш</option><option>усталость</option>
    </select>
    <label class="dim" style="margin-top:8px;display:block">Скриншот графика</label>
    <input id="dlgFile" type="file" accept="image/*">
    <div class="row" style="margin-top:14px;justify-content:flex-end">
      <button class="sec" value="cancel">Отмена</button>
      <button onclick="saveTrade(event)">Сохранить</button>
    </div>
  </form>
</dialog>

<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let settings = {daily_goal_pct: 3, daily_stop_pct: 2};
let editId = null;
const $ = id => document.getElementById(id);
const money = v => (v>=0?"+":"") + v.toFixed(2) + "$";
const esc = s => (s??"").toString().replace(/</g,"&lt;");

async function doLogin(){
  const {error} = await sb.auth.signInWithPassword({email:$("email").value, password:$("pass").value});
  if(error){$("loginErr").textContent = "Не вошёл: " + error.message; return}
  location.reload();
}

async function doSync(){
  $("syncBtn").textContent = "⏳ Синхронизация…";
  try{
    const {data:{session}} = await sb.auth.getSession();
    const r = await fetch(SYNC_URL, {headers:{Authorization:"Bearer "+session.access_token}});
    const j = await r.json();
    if(!j.ok) throw new Error(j.error);
  }catch(e){alert("Ошибка синка: "+e.message)}
  $("syncBtn").textContent = "⟳ Синк с Bybit";
  render();
}

async function render(){
  const today = new Date().toISOString().slice(0,10);
  const {data:st} = await sb.from("settings").select("*").eq("id",1).maybeSingle();
  if(st) settings = st;
  const {data:day} = await sb.from("days").select("*").eq("day",today).maybeSingle();
  const since = new Date(Date.now()-30*86400e3).toISOString();
  const {data:trades} = await sb.from("trades").select("*").gte("closed_at",since).order("closed_at",{ascending:false});
  renderDay(day, trades||[], today);
  renderStats(trades||[]);
  renderTrades(trades||[]);
}

function renderDay(day, trades, today){
  const el = $("dayCard");
  if(!day){el.innerHTML = "<b>Сегодня ещё не было синка.</b> <span class=dim>Нажми «Синк с Bybit» — зафиксирую баланс начала дня и посчитаю цель.</span>"; return}
  const goal$ = day.start_balance * settings.daily_goal_pct/100;
  const stop$ = -day.start_balance * settings.daily_stop_pct/100;
  const pnl = trades.filter(t=>t.closed_at&&t.closed_at.slice(0,10)===today).reduce((s,t)=>s+(t.pnl||0),0);
  const pct = pnl/day.start_balance*100;
  const prog = Math.max(0, Math.min(100, pnl/goal$*100));
  const status = pnl>=goal$ ? "🎯 ЦЕЛЬ ДНЯ ВЫПОЛНЕНА — дальше рискуем только прибылью дня"
    : pnl<=stop$ ? "🛑 СТОП ДНЯ (−"+settings.daily_stop_pct+"%) — торговля до завтра закрыта"
    : "";
  el.innerHTML = `
    <div class="grid">
      <div class="stat"><span class="dim">Баланс на утро</span><b>${day.start_balance.toFixed(2)}$</b></div>
      <div class="stat"><span class="dim">Цель дня (+${settings.daily_goal_pct}%)</span><b class="y">${money(goal$)}</b></div>
      <div class="stat"><span class="dim">Сделано сегодня</span><b class="${pnl>=0?'g':'r'}">${money(pnl)} (${pct>=0?'+':''}${pct.toFixed(2)}%)</b></div>
      <div class="stat"><span class="dim">Осталось до цели</span><b>${pnl>=goal$?'—':money(goal$-pnl)}</b></div>
      <div class="stat"><span class="dim">Стоп дня (−${settings.daily_stop_pct}%)</span><b class="r">${money(stop$)}</b></div>
    </div>
    <div class="bar"><div style="width:${prog}%;background:${pnl>=0?'var(--g)':'var(--r)'}"></div></div>
    ${status?`<div style="margin-top:10px;font-weight:600">${status}</div>`:""}`;
}

function renderStats(trades){
  const n = trades.length;
  const wins = trades.filter(t=>t.pnl>0);
  const losses = trades.filter(t=>t.pnl<0);
  const sum = a => a.reduce((s,t)=>s+t.pnl,0);
  const pf = Math.abs(sum(losses))>0 ? (sum(wins)/Math.abs(sum(losses))).toFixed(2) : "∞";
  $("stats").innerHTML = `
    <div class="stat"><span class="dim">Сделок</span><b>${n}</b></div>
    <div class="stat"><span class="dim">Винрейт</span><b>${n?(wins.length/n*100).toFixed(0):0}%</b></div>
    <div class="stat"><span class="dim">Итог 30 дн</span><b class="${sum(trades)>=0?'g':'r'}">${money(sum(trades))}</b></div>
    <div class="stat"><span class="dim">Профит-фактор</span><b>${pf}</b></div>
    <div class="stat"><span class="dim">Ср. прибыль</span><b class="g">${wins.length?money(sum(wins)/wins.length):'—'}</b></div>
    <div class="stat"><span class="dim">Ср. убыток</span><b class="r">${losses.length?money(sum(losses)/losses.length):'—'}</b></div>`;
  const agg = (keyFn) => {
    const m = {};
    trades.forEach(t=>{const k=keyFn(t); if(k==null)return; m[k]=m[k]||{n:0,pnl:0}; m[k].n++; m[k].pnl+=t.pnl||0});
    return Object.entries(m).sort((a,b)=>b[1].pnl-a[1].pnl);
  };
  const rows = arr => arr.map(([k,v])=>`<tr><td>${esc(k)}</td><td>${v.n}</td><td class="${v.pnl>=0?'g':'r'}">${money(v.pnl)}</td></tr>`).join("");
  $("bySym").innerHTML = "<tr><th>Монета</th><th>Сделок</th><th>P&L</th></tr>" + rows(agg(t=>t.symbol));
  $("byHour").innerHTML = "<tr><th>Час</th><th>Сделок</th><th>P&L</th></tr>" +
    rows(agg(t=>t.opened_at? new Date(t.opened_at).getHours()+":00" : null));
}

function renderTrades(trades){
  $("trades").innerHTML = "<tr><th>Закрыта</th><th>Монета</th><th>Напр.</th><th>Вход</th><th>Выход</th><th>P&L</th><th>Состояние</th><th>Комментарий</th><th>Скрин</th><th></th></tr>" +
    trades.map(t=>`<tr>
      <td class="dim">${t.closed_at? new Date(t.closed_at).toLocaleString("ru",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):""}</td>
      <td><b>${esc(t.symbol)}</b></td>
      <td>${t.side==="Buy"?"лонг":"шорт"}</td>
      <td>${t.entry_price??""}</td><td>${t.exit_price??""}</td>
      <td class="${t.pnl>=0?'g':'r'}"><b>${money(t.pnl||0)}</b></td>
      <td>${esc(t.emotion)||"<span class=dim>—</span>"}</td>
      <td style="max-width:180px">${esc(t.comment)||"<span class=dim>—</span>"}</td>
      <td>${t.screenshot_url?`<img class="thumb" src="${t.screenshot_url}" onclick="window.open(this.src)">`:"<span class=dim>—</span>"}</td>
      <td><button class="sec" style="padding:4px 10px" onclick="openEdit('${t.id}')">✎</button></td>
    </tr>`).join("");
  window._trades = trades;
}

function openEdit(id){
  editId = id;
  const t = window._trades.find(x=>x.id===id);
  $("dlgTitle").textContent = t.symbol + " · " + money(t.pnl||0);
  $("dlgComment").value = t.comment||"";
  $("dlgEmotion").value = t.emotion||"";
  $("dlgFile").value = "";
  $("dlg").showModal();
}

async function saveTrade(ev){
  ev.preventDefault();
  const upd = {comment: $("dlgComment").value, emotion: $("dlgEmotion").value};
  const f = $("dlgFile").files[0];
  if(f){
    const path = editId + "_" + Date.now() + "." + f.name.split(".").pop();
    const {error} = await sb.storage.from("screens").upload(path, f);
    if(!error){
      const {data} = await sb.storage.from("screens").createSignedUrl(path, 60*60*24*365*5);
      upd.screenshot_url = data.signedUrl;
    }
  }
  await sb.from("trades").update(upd).eq("id", editId);
  $("dlg").close();
  render();
}

(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(!session){$("login").style.display="block"; return}
  $("app").style.display="block";
  render();
})();
</script>
</body>
</html>
